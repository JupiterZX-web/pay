<script>
    const API_BASE = "http://localhost:8080/api/wallet";

    // Core Login Handler connecting to Java backend
    async function verifyAdminGateway() {
        const user = document.getElementById("adminUser").value.trim();
        const pass = document.getElementById("adminPass").value;

        if (!user || !pass) {
            triggerNotification("authToast", "Please complete all validation fields.", "error");
            return;
        }

        try {
            // Forward authorization payload to Spring Boot server
            const response = await fetch(`${API_BASE}/login?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`, {
                method: 'POST'
            });

            if (response.ok) {
                // Clear login inputs
                document.getElementById("adminUser").value = "";
                document.getElementById("adminPass").value = "";

                // Transition layout workspace views
                document.getElementById("authPanel").classList.add("hidden");
                document.getElementById("dashboardPanel").classList.remove("hidden");
                document.getElementById("operatorDisplay").textContent = user;
                
                // Fetch the live database logs immediately upon success
                fetchLedger();
            } else {
                const errorMsg = await response.text();
                triggerNotification("authToast", errorMsg, "error");
            }
        } catch (err) {
            triggerNotification("authToast", "Connection failure: Ensure Java server is online.", "error");
        }
    }

    function terminateSession() {
        document.getElementById("dashboardPanel").classList.add("hidden");
        document.getElementById("authPanel").classList.remove("hidden");
    }

    // Realtime System Ledger Mapping Engine
    async function fetchLedger() {
        try {
            const response = await fetch(`${API_BASE}/ledger`);
            const data = await response.json();
            const tbody = document.getElementById("ledgerTableBody");
            tbody.innerHTML = "";

            for (const [username, balance] of Object.entries(data)) {
                const row = document.createElement("tr");
                
                const userCell = document.createElement("td");
                userCell.textContent = username;
                
                const balanceCell = document.createElement("td");
                balanceCell.textContent = `$${balance.toFixed(2)}`;
                balanceCell.className = balance >= 0 ? "val-positive" : "val-negative";

                row.appendChild(userCell);
                row.appendChild(balanceCell);
                tbody.appendChild(row);
            }
        } catch (err) {
            triggerNotification("dashboardToast", "Backend connection dropped.", "error");
        }
    }

    async function createNewUser() {
        const username = document.getElementById("newUsername").value.trim().toLowerCase();
        const balance = parseFloat(document.getElementById("initialDeposit").value);

        if(!username) {
            triggerNotification("dashboardToast", "Execution Blocked: Target name undefined.", "error");
            return;
        }

        const response = await fetch(`${API_BASE}/create?username=${username}&balance=${balance}`, { method: 'POST' });
        const message = await response.text();
        
        triggerNotification("dashboardToast", message, response.ok ? "success" : "error");
        if (response.ok) {
            document.getElementById("newUsername").value = "";
            document.getElementById("initialDeposit").value = "0.00";
            fetchLedger();
        }
    }

    async function modifyFunds(action) {
        const username = document.getElementById("targetUser").value.trim().toLowerCase();
        const amount = parseFloat(document.getElementById("transactionAmount").value);

        if(!username || isNaN(amount) || amount <= 0) {
            triggerNotification("dashboardToast", "Validation Fault: Verify target parameters.", "error");
            return;
        }

        const endpoint = action === 'add' ? 'add' : 'take';
        const response = await fetch(`${API_BASE}/${endpoint}?username=${username}&amount=${amount}`, { method: 'POST' });
        const message = await response.text();

        triggerNotification("dashboardToast", message, response.ok ? "success" : "error");
        if (response.ok) {
            document.getElementById("targetUser").value = "";
            document.getElementById("transactionAmount").value = "";
            fetchLedger();
        }
    }

    function triggerNotification(targetId, msg, type) {
        const toast = document.getElementById(targetId);
        toast.textContent = msg;
        toast.className = `toast toast-${type}`;
        setTimeout(() => toast.classList.add("hidden"), 5000);
    }
</script>
