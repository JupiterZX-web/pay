<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Credit Card</title>
    <style>
        /* Modern aesthetic workspace container */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-gradient: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
            --card-width: 400px;
            --card-height: 250px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* Essential for 3D depth perception */
        }

        /* 3D Viewport wrapper tracking cursor bounding boxes */
        .card-container {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: transform 0.1s ease-out; /* Keeps mouse tracking smooth */
        }

        /* The actual visual credit card skin layer */
        .credit-card {
            width: 100%;
            height: 100%;
            background: var(--card-gradient);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: absolute;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Card Elements layout formatting */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            transform: translateZ(30px); /* Gives elements pop-out depth inside the 3D grid */
        }

        .brand-name {
            color: rgba(255, 255, 255, 0.9);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-style: italic;
        }

        /* Simulated microchip hardware module layout */
        .smart-chip {
            width: 50px;
            height: 38px;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            border-radius: 6px;
            position: relative;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
            transform: translateZ(25px);
        }

        .smart-chip::before {
            content: '';
            position: absolute;
            top: 0; left: 16px; right: 16px; bottom: 0;
            border-left: 1px solid rgba(0,0,0,0.15);
            border-right: 1px solid rgba(0,0,0,0.15);
        }

        .smart-chip::after {
            content: '';
            position: absolute;
            left: 0; top: 12px; bottom: 12px; right: 0;
            border-top: 1px solid rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(0,0,0,0.15);
        }

        /* Embossed numerical layout systems */
        .card-number {
            color: #ffffff;
            font-size: 24px;
            letter-spacing: 3.5px;
            word-spacing: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
            margin-top: 20px;
            transform: translateZ(40px); /* Highest elevation tier layer */
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            transform: translateZ(30px);
        }

        .meta-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
        }

        .meta-value {
            color: #ffffff;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Abstract overlapping network payment logo structure */
        .payment-logo {
            display: flex;
            transform: translateZ(35px);
        }

        .circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }

        .circle-red {
            background: rgba(239, 68, 68, 0.85);
            margin-right: -14px;
        }

        .circle-orange {
            background: rgba(245, 158, 11, 0.85);
        }
    </style>
</head>
<body>

    <!-- 3D CARD INTERACTIVE VIEWPORT -->
    <div class="card-container" id="cardContainer">
        <div class="credit-card">
            <!-- TOP STRIP -->
            <div class="card-top">
                <div class="smart-chip"></div>
                <div class="brand-name">Jupiter Vault</div>
            </div>

            <!-- EMBOSSED NUMBER MATRIX -->
            <div class="card-number">5412 7512 3456 7890</div>

            <!-- BOTTOM REVENUE DATA STRIP -->
            <div class="card-bottom">
                <div class="holder-details">
                    <div class="meta-label">Card Holder</div>
                    <div class="meta-value">Jupiter Master</div>
                </div>
                <div class="expiry-details">
                    <div class="meta-label">Expires</div>
                    <div class="meta-value">12 / 30</div>
                </div>
                <div class="payment-logo">
                    <div class="circle circle-red"></div>
                    <div class="circle circle-orange"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MOUSE TRACKING INTERACTIVE SCRIPT -->
    <script>
        const card = document.getElementById('cardContainer');
        const constraint = 25; // Controls maximum tilt calculation parameters (higher = more rotation tilt)

        document.addEventListener('mousemove', (e) => {
            const box = card.getBoundingClientRect();
            
            // Calculate cursor coordinates relative to the center of the card
            const cardCenterX = box.left + box.width / 2;
            const cardCenterY = box.top + box.height / 2;
            
            const mouseX = e.clientX - cardCenterX;
            const mouseY = e.clientY - cardCenterY;

            // Generate pitch and yaw variables based on mouse distance vectors
            const rotateX = -(mouseY / (window.innerHeight / 2)) * constraint;
            const rotateY = (mouseX / (window.innerWidth / 2)) * constraint;

            // Apply dynamic 3D styles via inline style generation
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Snap back card to parallel perspective when the mouse leaves the document window area
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });
    </script>
</body>
</html>
